name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  typescript-sdk:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: packages/asymptote-sdk-js/package-lock.json
      - name: Install SDK dependencies
        working-directory: packages/asymptote-sdk-js
        run: npm ci
      - name: Test SDK
        working-directory: packages/asymptote-sdk-js
        run: npm test
      - name: Type-check SDK
        working-directory: packages/asymptote-sdk-js
        run: npm run check
      - name: Build SDK
        working-directory: packages/asymptote-sdk-js
        run: npm run build
      - name: Validate SDK package contents
        working-directory: packages/asymptote-sdk-js
        run: npm run pack:dry-run
      - name: Smoke install SDK package
        working-directory: packages/asymptote-sdk-js
        run: npm run pack:smoke

  go-test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: cli/beacon/go.mod
      - name: Build embedded hooks binary
        working-directory: cli/beacon
        # hooks.bin is gitignored (build-time artifact). The CLI embeds it via
        # //go:embed, so build the real binary for this runner before testing —
        # a placeholder is not enough (InstallFactory requires a real binary).
        run: make build-hooks-current
      - name: Test CLI
        working-directory: cli/beacon
        run: go test ./...
      - name: Test CLI race-sensitive packages
        working-directory: cli/beacon
        run: go test -race ./internal/endpoint/...
      - name: Test hooks
        working-directory: cli/beacon-hooks
        run: go test ./...
      - name: Test collector exporter
        working-directory: collector-builder/exporter/beaconjsonexporter
        run: go test ./...
      - name: Test observe SDK + threat-rules conformance
        working-directory: pkg/asymptoteobserve
        run: go test ./...
      - name: Public CLI command tree smoke test
        working-directory: cli/beacon
        run: |
          make build
          ./beacon --help > /tmp/beacon-help.txt
          ./beacon endpoint --help > /tmp/beacon-endpoint-help.txt
          ./beacon endpoint hooks --help > /tmp/beacon-hooks-help.txt
          ./beacon endpoint integrations claude-cowork --help > /tmp/beacon-cowork-help.txt
          ./beacon endpoint wazuh --help > /tmp/beacon-wazuh-help.txt
          ./beacon endpoint rapid7 --help > /tmp/beacon-rapid7-help.txt
          ./beacon scan --help > /tmp/beacon-scan-help.txt
          ./beacon rules --help > /tmp/beacon-rules-help.txt
          ./beacon rules lint --help > /tmp/beacon-rules-lint-help.txt
          for forbidden in init update claude cursor dep-scan config whoami; do
            if grep -E "^[[:space:]]+$forbidden([[:space:]]|$)" /tmp/beacon-help.txt; then
              echo "forbidden command exposed: $forbidden"
              exit 1
            fi
          done

  cross-build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: amd64
            make_target: build-darwin-amd64
          - goos: darwin
            goarch: arm64
            make_target: build-darwin-arm64
          - goos: linux
            goarch: amd64
            make_target: build-linux-amd64
          - goos: linux
            goarch: arm64
            make_target: build-linux-arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: cli/beacon/go.mod
      - name: Build Beacon for ${{ matrix.goos }}/${{ matrix.goarch }}
        working-directory: cli/beacon
        run: make ${{ matrix.make_target }}

  package-smoke:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: cli/beacon/go.mod
      - name: Validate packaging scripts
        run: |
          test -x packaging/macos/install-endpoint.sh
          test -x packaging/macos/uninstall-endpoint.sh
          test -x packaging/macos/smoke-endpoint.sh
          test -f collector-builder/builder.yaml
          sh packaging/macos/test-endpoint-scripts.sh
      - name: Build macOS package skeleton
        run: |
          (cd cli/beacon && make build)
          mkdir -p /tmp/beacon-collector
          printf '#!/bin/sh\nexit 0\n' > /tmp/beacon-collector/beacon-otelcol
          chmod +x /tmp/beacon-collector/beacon-otelcol
          OUT_DIR=/tmp/beacon-pkg BEACON_COLLECTOR=/tmp/beacon-collector/beacon-otelcol packaging/macos/build-pkg.sh
          pkgutil --payload-files /tmp/beacon-pkg/*.pkg | awk '$0 == "./opt/beacon/bin/beacon" { found = 1 } END { exit !found }'
          pkgutil --payload-files /tmp/beacon-pkg/*.pkg | awk '$0 == "./opt/beacon/bin/beacon-otelcol" { found = 1 } END { exit !found }'
      - name: Endpoint install smoke test
        run: sh packaging/macos/smoke-endpoint.sh

